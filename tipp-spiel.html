<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier-Tipp-Spiel 🐾</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nunito', 'Comic Sans MS', 'Chalkboard SE', cursive;
            background: linear-gradient(135deg, #ffd6e7 0%, #c8f0d8 50%, #d6e8ff 100%);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #app { width: 100%; max-width: 820px; }

        .card {
            background: white;
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12);
        }

        /* ── Welcome ── */
        .welcome { text-align: center; }
        .welcome h1 { font-size: 2.8rem; font-weight: 900; color: #4a4a6a; margin-bottom: 6px; }
        .welcome .subtitle { font-size: 1.15rem; color: #999; margin-bottom: 28px; font-weight: 600; }
        .welcome .animals-row { font-size: 2.8rem; margin-bottom: 28px; display: inline-block; animation: bounce 2s infinite; }

        .btn {
            background: linear-gradient(135deg, #ff9ebc, #c9b8ff);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 16px 48px;
            font-size: 1.35rem;
            font-family: inherit;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(255,158,188,0.45);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 7px 22px rgba(255,158,188,0.55); }
        .btn:active { transform: translateY(1px); }

        /* ── Game header ── */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .level-badge {
            background: linear-gradient(135deg, #c9b8ff, #87ceeb);
            color: white;
            padding: 8px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.95rem;
        }
        .hearts { font-size: 1.45rem; letter-spacing: 2px; }
        .score { font-size: 1rem; font-weight: 700; color: #4a4a6a; }

        /* ── Target area ── */
        .target-area { text-align: center; margin: 20px 0 10px; }
        .target-label {
            font-size: 0.85rem;
            color: #bbb;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 14px;
        }
        .target-letter {
            font-size: 7rem;
            font-weight: 900;
            color: #4a4a6a;
            line-height: 1;
            display: inline-block;
            transition: transform 0.1s;
        }
        .target-word { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .letter-box {
            width: 54px;
            height: 62px;
            border-radius: 12px;
            border: 3px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.9rem;
            font-weight: 800;
            color: #4a4a6a;
            background: #f8f8f8;
            transition: all 0.15s;
        }
        .letter-box.current {
            border-color: #c9b8ff;
            background: #f3f0ff;
            transform: scale(1.12);
            box-shadow: 0 4px 14px rgba(201,184,255,0.45);
        }
        .letter-box.done {
            border-color: #a8edca;
            background: #f0fff8;
            color: #2ea06e;
        }

        /* ── Animal reward ── */
        .animal-reward {
            text-align: center;
            height: 90px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }
        .animal-emoji { font-size: 4.5rem; display: none; }
        .animal-name { font-size: 1.1rem; font-weight: 800; color: #2ea06e; display: none; }
        .animal-emoji.show { display: block; animation: popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275); }
        .animal-name.show { display: block; animation: popIn 0.5s 0.1s both cubic-bezier(0.175,0.885,0.32,1.275); }

        /* ── Progress ── */
        .progress-area { margin: 14px 0 0; }
        .progress-label { font-size: 0.82rem; color: #bbb; margin-bottom: 6px; font-weight: 700; }
        .progress-bar { background: #f0f0f0; border-radius: 50px; height: 11px; overflow: hidden; }
        .progress-fill {
            background: linear-gradient(90deg, #a8edca, #c9b8ff);
            height: 100%;
            border-radius: 50px;
            transition: width 0.35s ease;
        }

        /* ── Keyboard ── */
        .keyboard-section { margin-top: 22px; }
        .keyboard-label { font-size: 0.8rem; color: #ccc; text-align: center; margin-bottom: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; }
        .keyboard { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .keyboard-row { display: flex; gap: 6px; }
        .key {
            min-width: 40px;
            height: 40px;
            padding: 0 6px;
            border-radius: 8px;
            background: #f5f5f5;
            border: 2px solid #e4e4e4;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.88rem;
            font-weight: 700;
            color: #888;
            font-family: inherit;
            transition: all 0.15s;
        }
        .key.highlight {
            background: #ffe066;
            border-color: #ffb800;
            color: #4a4a6a;
            transform: scale(1.22);
            box-shadow: 0 4px 14px rgba(255,184,0,0.45);
        }
        .key.flash-wrong {
            background: #ffcdd2;
            border-color: #ef5350;
            color: #c62828;
            animation: shakeKey 0.35s;
        }

        /* ── Flash overlay ── */
        .flash-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            z-index: 50;
            transition: opacity 0.1s;
        }
        .flash-overlay.correct { background: rgba(168,237,202,0.28); }
        .flash-overlay.wrong   { background: rgba(255,120,120,0.22); }
        .flash-overlay.active  { opacity: 1; }

        /* ── Level / Game complete ── */
        .complete-screen { text-align: center; }
        .complete-screen h2 { font-size: 2.4rem; font-weight: 900; color: #4a4a6a; margin-bottom: 12px; }
        .complete-screen .sub { font-size: 1.05rem; color: #aaa; font-weight: 600; margin-bottom: 20px; }
        .star-row { font-size: 2.8rem; margin: 12px 0; letter-spacing: 4px; }
        .parade { font-size: 2.4rem; margin: 20px 0; line-height: 1.8; }
        .big-score { font-size: 1.4rem; font-weight: 800; color: #4a4a6a; margin-bottom: 28px; }

        /* ── Tip box ── */
        .tip-box {
            background: #fffbe6;
            border: 2px solid #ffe066;
            border-radius: 14px;
            padding: 10px 16px;
            font-size: 0.9rem;
            font-weight: 700;
            color: #7a6a00;
            text-align: center;
            margin-bottom: 16px;
        }

        /* ── Animations ── */
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-12deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            25% { transform: translateX(-9px); }
            75% { transform: translateX(9px); }
        }
        @keyframes shakeKey {
            0%,100% { transform: translateX(0) scale(1); }
            30% { transform: translateX(-5px) scale(1.1); }
            70% { transform: translateX(5px) scale(1.1); }
        }
        .shake { animation: shake 0.35s; }

        /* ── Responsive ── */
        @media (max-width: 580px) {
            .card { padding: 20px 16px; }
            .key { min-width: 30px; height: 34px; font-size: 0.75rem; }
            .letter-box { width: 42px; height: 50px; font-size: 1.5rem; }
            .target-letter { font-size: 5rem; }
        }
    </style>
</head>
<body>
<div id="app"></div>
<div class="flash-overlay" id="flashOverlay"></div>

<script>
// ════════════════════════════════════════
// DATA
// ════════════════════════════════════════

const LEVELS = [
    {
        id: 1,
        name: "Stufe 1",
        title: "Heimreihe",
        type: "letters",
        items: ["a","s","d","f","g","h","j","k","l"],
        target: 20,
        tip: "💡 Diese Tasten sind in der Mitte — das ist die Heimreihe!"
    },
    {
        id: 2,
        name: "Stufe 2",
        title: "Kurze Wörter",
        type: "words",
        items: ["Aal","Hai","Kuh","Emu","Gnu","Hase","Hund","Affe","Esel"],
        target: 7,
        tip: "💡 Buchstabe für Buchstabe — keine Eile!"
    },
    {
        id: 3,
        name: "Stufe 3",
        title: "Tiere",
        type: "words",
        items: ["Katze","Pferd","Vogel","Fisch","Schaf","Ente","Tiger","Biber","Panda","Adler"],
        target: 8,
        tip: "💡 Schau auf die gelbe Taste — da musst du drücken!"
    },
    {
        id: 4,
        name: "Stufe 4",
        title: "Große Tiere",
        type: "words",
        items: ["Delphin","Pinguin","Giraffe","Elefant","Hamster","Papagei","Krokodil"],
        target: 6,
        tip: "💡 Die letzte Stufe — du schaffst das!"
    }
];

const ANIMAL_EMOJIS = {
    "Aal":"🐍","Hai":"🦈","Kuh":"🐮","Emu":"🦤","Gnu":"🦬",
    "Hase":"🐰","Hund":"🐶","Affe":"🐵","Esel":"🐴",
    "Katze":"🐱","Pferd":"🐴","Vogel":"🐦","Fisch":"🐟",
    "Schaf":"🐑","Ente":"🦆","Tiger":"🐯","Biber":"🦫",
    "Panda":"🐼","Adler":"🦅",
    "Delphin":"🐬","Pinguin":"🐧","Giraffe":"🦒","Elefant":"🐘",
    "Hamster":"🐹","Papagei":"🦜","Krokodil":"🐊"
};

// QWERTZ layout
const KEYBOARD_ROWS = [
    ["q","w","e","r","t","z","u","i","o","p"],
    ["a","s","d","f","g","h","j","k","l"],
    ["y","x","c","v","b","n","m"]
];

// ════════════════════════════════════════
// STATE
// ════════════════════════════════════════

let state = {
    screen: "welcome",
    levelIdx: 0,
    hearts: 3,
    totalScore: 0,
    progress: 0,
    currentItem: null,
    currentPos: 0,
    itemPool: [],
    itemIndex: 0,
    lastAnimal: null,
    wrongKey: null,
    shaking: false,
};

// ════════════════════════════════════════
// LOGIC
// ════════════════════════════════════════

function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function startGame() {
    state = {
        screen: "game",
        levelIdx: 0,
        hearts: 3,
        totalScore: 0,
        progress: 0,
        currentItem: null,
        currentPos: 0,
        itemPool: [],
        itemIndex: 0,
        lastAnimal: null,
        wrongKey: null,
        shaking: false,
    };
    startLevel(0);
}

function startLevel(idx) {
    const level = LEVELS[idx];
    state.levelIdx = idx;
    state.hearts = 3;
    state.progress = 0;
    state.lastAnimal = null;
    state.wrongKey = null;
    state.shaking = false;

    if (level.type === "letters") {
        const pool = [];
        while (pool.length < level.target + 10) pool.push(...shuffle(level.items));
        state.itemPool = pool;
    } else {
        // Cycle words enough times to cover target
        const pool = [];
        while (pool.length < level.target + 3) pool.push(...shuffle(level.items));
        state.itemPool = pool;
    }
    state.itemIndex = 0;
    nextItem();
}

function nextItem() {
    state.currentItem = state.itemPool[state.itemIndex % state.itemPool.length];
    state.itemIndex++;
    state.currentPos = 0;
    state.lastAnimal = null;
    render();
}

function handleKeyPress(e) {
    if (state.screen !== "game") return;
    if (e.ctrlKey || e.altKey || e.metaKey) return;
    if (state.shaking) return; // debounce during shake

    const key = e.key.toLowerCase();
    if (key.length !== 1 || !key.match(/[a-z]/)) return;

    const level = LEVELS[state.levelIdx];

    if (level.type === "letters") {
        if (key === state.currentItem.toLowerCase()) {
            onLetterCorrect();
        } else {
            onWrong(key);
        }
    } else {
        const target = state.currentItem[state.currentPos].toLowerCase();
        if (key === target) {
            state.currentPos++;
            if (state.currentPos >= state.currentItem.length) {
                onWordComplete();
            } else {
                flashOverlay("correct", 80);
                render();
            }
        } else {
            onWrong(key);
        }
    }
}

function onLetterCorrect() {
    state.progress++;
    state.totalScore++;
    flashOverlay("correct", 120);
    if (!checkLevelComplete()) nextItem();
}

function onWordComplete() {
    state.progress++;
    state.totalScore++;
    state.lastAnimal = {
        emoji: ANIMAL_EMOJIS[state.currentItem] || "🐾",
        name: state.currentItem
    };
    flashOverlay("correct", 180);
    render();
    if (!checkLevelComplete()) {
        setTimeout(() => { if (state.screen === "game") nextItem(); }, 1300);
    }
}

function onWrong(key) {
    state.hearts--;
    state.wrongKey = key;
    state.shaking = true;
    flashOverlay("wrong", 350);
    render();

    setTimeout(() => {
        state.wrongKey = null;
        state.shaking = false;
        if (state.hearts <= 0) {
            startLevel(state.levelIdx);
        } else {
            render();
        }
    }, 420);
}

function checkLevelComplete() {
    if (state.progress >= LEVELS[state.levelIdx].target) {
        state.screen = "levelComplete";
        render();
        return true;
    }
    return false;
}

function nextLevel() {
    if (state.levelIdx + 1 >= LEVELS.length) {
        state.screen = "gameComplete";
        render();
    } else {
        state.screen = "game";
        startLevel(state.levelIdx + 1);
    }
}

function flashOverlay(type, dur) {
    const el = document.getElementById("flashOverlay");
    el.className = `flash-overlay ${type} active`;
    setTimeout(() => el.className = "flash-overlay", dur);
}

function getTargetKey() {
    if (!state.currentItem) return null;
    const level = LEVELS[state.levelIdx];
    if (level.type === "letters") return state.currentItem.toLowerCase();
    if (state.currentPos < state.currentItem.length)
        return state.currentItem[state.currentPos].toLowerCase();
    return null;
}

// ════════════════════════════════════════
// RENDER
// ════════════════════════════════════════

function render() {
    const app = document.getElementById("app");
    switch (state.screen) {
        case "welcome":      app.innerHTML = renderWelcome(); break;
        case "game":         app.innerHTML = renderGame(); break;
        case "levelComplete":app.innerHTML = renderLevelComplete(); break;
        case "gameComplete": app.innerHTML = renderGameComplete(); break;
    }
}

function renderWelcome() {
    return `<div class="card welcome">
        <h1>🐾 Tier-Tipp-Spiel</h1>
        <p class="subtitle">Lerne tippen mit Tieren auf Deutsch!</p>
        <div class="animals-row">🐶 🐱 🐰 🦆 🐯 🦒</div>
        <div style="color:#bbb;font-size:0.9rem;font-weight:700;margin-bottom:24px">
            4 Stufen &nbsp;·&nbsp; Von Buchstaben bis zu langen Tiernamen
        </div>
        <button class="btn" onclick="startGame()">Los geht's! 🎉</button>
    </div>`;
}

function renderGame() {
    const level = LEVELS[state.levelIdx];
    const heartsHtml = "❤️".repeat(state.hearts) + "🖤".repeat(3 - state.hearts);
    const pct = Math.min(100, (state.progress / level.target) * 100);
    const targetKey = getTargetKey();

    let targetHtml;
    if (level.type === "letters") {
        targetHtml = `
            <div class="target-label">Tippe diesen Buchstaben:</div>
            <div class="target-letter${state.shaking ? " shake" : ""}">
                ${state.currentItem.toUpperCase()}
            </div>`;
    } else {
        targetHtml = `
            <div class="target-label">Tippe dieses Wort:</div>
            <div class="target-word${state.shaking ? " shake" : ""}">
                ${[...state.currentItem].map((ch, i) => {
                    let cls = "letter-box";
                    if (i === state.currentPos) cls += " current";
                    else if (i < state.currentPos) cls += " done";
                    return `<div class="${cls}">${ch}</div>`;
                }).join("")}
            </div>`;
    }

    const animalHtml = state.lastAnimal
        ? `<div class="animal-emoji show">${state.lastAnimal.emoji}</div>
           <div class="animal-name show">Super! ${state.lastAnimal.name}! 🌟</div>`
        : "";

    const keyboardHtml = KEYBOARD_ROWS.map(row =>
        `<div class="keyboard-row">${row.map(k => {
            let cls = "key";
            if (k === targetKey) cls += " highlight";
            if (k === state.wrongKey) cls += " flash-wrong";
            return `<div class="${cls}">${k.toUpperCase()}</div>`;
        }).join("")}</div>`
    ).join("");

    return `<div class="card">
        <div class="game-header">
            <div class="level-badge">${level.name}: ${level.title}</div>
            <div class="hearts">${heartsHtml}</div>
            <div class="score">⭐ ${state.totalScore}</div>
        </div>
        <div class="tip-box">${level.tip}</div>
        <div class="target-area">${targetHtml}</div>
        <div class="animal-reward">${animalHtml}</div>
        <div class="progress-area">
            <div class="progress-label">Fortschritt: ${state.progress} / ${level.target}</div>
            <div class="progress-bar">
                <div class="progress-fill" style="width:${pct}%"></div>
            </div>
        </div>
        <div class="keyboard-section">
            <div class="keyboard-label">Tastatur</div>
            <div class="keyboard">${keyboardHtml}</div>
        </div>
    </div>`;
}

function renderLevelComplete() {
    const level = LEVELS[state.levelIdx];
    const isLast = state.levelIdx + 1 >= LEVELS.length;
    const parade = level.type !== "letters"
        ? level.items.map(w => ANIMAL_EMOJIS[w] || "🐾").join(" ")
        : "⭐ 🌟 ✨ 🌟 ⭐";

    return `<div class="card complete-screen">
        <h2>🎉 Toll gemacht!</h2>
        <p class="sub">${level.name} „${level.title}" abgeschlossen!</p>
        <div class="star-row">⭐⭐⭐</div>
        <div class="parade">${parade}</div>
        <p class="big-score">Punkte: ${state.totalScore}</p>
        <button class="btn" onclick="nextLevel()">
            ${isLast ? "Spiel abschließen 🏆" : "Weiter zu " + LEVELS[state.levelIdx+1].name + " →"}
        </button>
    </div>`;
}

function renderGameComplete() {
    return `<div class="card complete-screen">
        <h2>🏆 Du hast gewonnen!</h2>
        <p class="sub">Alle 4 Stufen geschafft — du bist eine Tipp-Meisterin!</p>
        <div class="parade">
            🐶 🐱 🐰 🦆 🐯 🦒<br>
            🐬 🐧 🐘 🦜 🐊 🦋
        </div>
        <div class="star-row">⭐⭐⭐⭐⭐</div>
        <p class="big-score">Gesamt-Punkte: ${state.totalScore}</p>
        <button class="btn" onclick="startGame()">Nochmal spielen! 🔄</button>
    </div>`;
}

// ════════════════════════════════════════
// INIT
// ════════════════════════════════════════

render();
document.addEventListener("keydown", handleKeyPress);
</script>
</body>
</html>
